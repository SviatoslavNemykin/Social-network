{% load static %}
<div class="reg-auth-btns">
    <button onclick="showReg()" class="reg-auth-btn">Реєстрація</button>
    <button onclick="showAuth()" class="reg-auth-btn deactivate">Авторизація</button>
</div>
<p class="reg-auth-p">Приєднуйся до World IT</p>
<form action="" method="post">
    <div class="form">
    {% csrf_token %}
    <div class="input-container">
        <label for="email" class="label">Електронна пошта</label>
        <div class="input">
            <input type="email" name="email" id="email" required placeholder="you@example.com"> 
            <img src=""></div>
    </div>
    <div class="input-container">
        <label for="email" class="label">Пароль</label>
        <div class="input">
            <input type="password" name="password" id="password" required placeholder="Введи пароль"> 
            <img src="{% static 'user_app/images/eye.svg' %}" alt="show_pass" class="show-pass" onclick="showPass(this)">
        </div>
    </div>
    <div class="input-container">
        <label for="email" class="label">Пароль</label>
        <div class="input">
            <input type="password" name="conf-password" id="conf-password" required placeholder="Повтори пароль"> 
            <img src="{% static 'user_app/images/eye.svg' %}" alt="show_pass" class="show-pass" onclick="showPass(this)">
        </div>
    </div>
    </div>
    <button type="submit" onclick="showConfirm()" class="submit" > Створити новий акаунт </button>
</form>

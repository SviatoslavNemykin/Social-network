{% load static %}

{% for person in users %}

<div class="profile-block">

    <div class="top-data">

        <div class="indicator">
            <img src="{% static 'home_app/images/avatar.svg' %}" alt="">
            <span class="avatar-indicator"></span>
        </div>

        <div class="text-data">

            <p class="nickname">
                {{ person.first_name }}
            </p>

            <p class="username">
                @{{ person.username }}
            </p>

        </div>

    </div>


    <div class="bottom-data">

        {% if section == 'requests' %}

            <a href="{% url 'user_posts' person.id %}" class="confirm-link">
                Підтвердити
            </a>

            <!-- <a href="{% url 'user_posts' person.id %}" class="delete-link">
                Видалити
            </a> -->

            <button
            type="button"
            class="delete-link friend-action"
            data-url="{% url 'friend_action' person.id 'delete' %}"
            >
            Відхилити
            </button>

        {% elif section == 'recommendations' %}

            <a href="{% url 'user_posts' person.id %}" class="confirm-link">
                Додати
            </a>

            <!-- <a href="{% url 'user_posts' person.id %}" class="delete-link">
                Видалити
            </a> -->

            <button
            type="button"
            class="delete-link friend-action"
            data-url="{% url 'friend_action' person.id 'dismiss' %}"
            >
            Приховати
            </button>

        {% elif section == 'friends' %}

            <a href="" class="confirm-link">
                Повідомлення
            </a>

            <!-- <a href="{% url 'user_posts' person.id %}" class="delete-link">
                Видалити
            </a> -->
            <button
            type="button"
            class="delete-link friend-action"
            data-url="{% url 'friend_action' person.id 'delete' %}"
            >
            Видалити
            </button>
        {% endif %}

    </div>

</div>

{% endfor %}
